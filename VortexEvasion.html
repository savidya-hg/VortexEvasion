<!DOCTYPE html>
<html>
<head>
    <title>Vortex Evasion</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        /*CSS neon-theming*/
        :root { 
            --neon-green: #00ff00; 
            --menu-font: 'Press Start 2P', cursive; 
            --gold: #ffd700; 
            --bg-glass: rgba(0, 15, 0, 0.95); 
        }
        
        body { margin: 0; background: #000; overflow: hidden; font-family: var(--menu-font); cursor: crosshair; }
        
        /*UI covers the game until player hits play*/
        #ui-layer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 100; display: flex; flex-direction: column; align-items: center; 
            background: rgba(0, 0, 0, 0.4); 
        }
        
        .game-title { margin-top: 80px; font-size: 2.2rem; color: #fff; text-shadow: 4px 4px var(--neon-green); text-align: center; line-height: 1.5; }
        
        /*login/signup*/
        .auth-container { position: absolute; top: 20px; right: 20px; display: flex; gap: 15px; z-index: 150; align-items: center; }
        
        .auth-btn { 
            background: rgba(0,0,0,0.7); color: #fff; border: 2px solid var(--neon-green); 
            padding: 8px 12px; font-family: var(--menu-font); font-size: 0.7rem; 
            cursor: pointer; text-transform: uppercase; transition: 0.3s;
        }
        .auth-btn:hover:not(:disabled) { background: var(--neon-green); color: #000; box-shadow: 0 0 15px var(--neon-green); }

        /*leaderboard icon*/
        #lb-icon { 
            position: absolute; top: 20px; left: 20px; z-index: 150; cursor: pointer;
            width: 40px; height: 40px; background: var(--gold);
            clip-path: polygon(20% 0%, 80% 0%, 100% 20%, 100% 50%, 80% 70%, 60% 70%, 60% 90%, 80% 90%, 80% 100%, 20% 100%, 20% 90%, 40% 90%, 40% 70%, 20% 70%, 0% 50%, 0% 20%);
        }
        
        /*play btn disabled by default until logged in*/
        .play-btn { 
            background: transparent; color: var(--neon-green); border: 4px solid var(--neon-green); 
            padding: 20px 40px; font-size: 1.2rem; font-family: var(--menu-font); 
            cursor: pointer; text-transform: uppercase; margin-top: auto; margin-bottom: 120px;
        }

        /*opups*/
        .modal, .terminal-window { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: var(--bg-glass); border: 4px solid var(--neon-green); padding: 30px; 
            z-index: 200; text-align: center; min-width: 400px;
        }


        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="lb-icon" onclick="openLeaderboard()"></div>

<div id="ui-layer">
    <h1 class="game-title">VORTEX<br>EVASION</h1>
    <button class="play-btn" id="main-play-btn" onclick="startGame()" disabled>LOGIN TO PLAY</button>
</div>

<div class="auth-container" id="auth-ui">
    <button class="auth-btn" onclick="openModal('signup-modal')">SIGN UP</button>
    <button class="auth-btn" onclick="openModal('login-modal')">LOGIN</button>
</div>

<div id="signup-modal" class="modal">
    <h2>ENLIST PILOT</h2>
    <input type="text" id="su-user" placeholder="NAME" style="display:block; margin:10px auto; background:#000; color:var(--neon-green); border:1px solid var(--neon-green); padding:10px;">
    <input type="password" id="su-pass" placeholder="PASS" style="display:block; margin:10px auto; background:#000; color:var(--neon-green); border:1px solid var(--neon-green); padding:10px;">
    <button class="auth-btn" onclick="handleSignUp()">READY</button>
    <button class="auth-btn" onclick="closeModals()">CANCEL</button>
</div>

<div id="login-modal" class="modal">
    <h2>IDENTIFY</h2>
    <input type="text" id="li-user" placeholder="NAME" style="display:block; margin:10px auto; background:#000; color:var(--neon-green); border:1px solid var(--neon-green); padding:10px;">
    <input type="password" id="li-pass" placeholder="PASS" style="display:block; margin:10px auto; background:#000; color:var(--neon-green); border:1px solid var(--neon-green); padding:10px;">
    <button class="auth-btn" onclick="handleLogin()">ENTER</button>
    <button class="auth-btn" onclick="closeModals()">CANCEL</button>
</div>

<div id="leaderboard-modal" class="terminal-window">
    <h2 style="color: var(--gold);">HALL OF FAME</h2>
    <div id="lb-list" style="color: var(--neon-green); font-size: 0.8rem; margin: 20px 0;">?</div>
    <button class="auth-btn" onclick="closeModals()">BACK</button>
</div>

<script>

/*databse connection*/
const _supabase = supabase.createClient('https://dqbtnmkiiwldlvrpaupj.supabase.co', 'sb_publishable_rMEMOFO_vVHyYdpjJQSqxg_djkgWVVT');
let currentUser = null;
let isPaused = true; //prevents game from running in the menu
let missiles;

/*phaser eng config*/
const config = { 
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default: 'arcade', arcade: { debug: false } }, 
    scene: { preload, create, update }
};
const game = new Phaser.Game(config);

/*assets*/
function preload() {
    this.load.image('ship', 'https://upload.wikimedia.org/wikipedia/commons/1/1f/Space-Invaders-ship.png');
}

/*create game UI*/
function create() {
    //hitbox
    player = this.physics.add.sprite(config.width/2, config.height/2, 'ship').setScale(0.06).setDepth(10);
    player.setSize(player.width - 40, player.height - 40).setOffset(20, 0); 

    //missile groups
    missiles = this.physics.add.group();

    //missile to missile explosion
    this.physics.add.collider(missiles, missiles, (m1, m2) => {
        m1.destroy();
        m2.destroy();
    }, null, this);
}

function update() {
    //ship follows cursor
    let pointer = this.input.activePointer;
    let targetAngle = Phaser.Math.Angle.Between(player.x, player.y, pointer.x, pointer.y) + Math.PI/2;
    player.rotation = Phaser.Math.Angle.RotateTo(player.rotation, targetAngle, 0.12);

    if (isPaused) return; //stop enemies if menu is open

    //missile Tracking
    missiles.getChildren().forEach(m => {
        //calculate angle to the player
        let angle = Phaser.Math.Angle.Between(m.x, m.y, player.x, player.y) + Math.PI/2;
        //missile rotation
        m.rotation = Phaser.Math.Angle.RotateTo(m.rotation, angle, 0.01); 
        //move missile forward
        this.physics.velocityFromRotation(m.rotation - Math.PI/2, 480, m.body.velocity);
    });
}

async function handleSignUp() {
    const u = document.getElementById('su-user').value;
    const p = document.getElementById('su-pass').value;
    await _supabase.from('leaderboards').insert([{ username: u, password: p, high_score: 0 }]);
    alert("ENLISTED! NOW LOGIN.");
    closeModals();
}

async function handleLogin() {
    const u = document.getElementById('li-user').value;
    const p = document.getElementById('li-pass').value;
    const { data } = await _supabase.from('leaderboards').select('*').eq('username', u).eq('password', p).maybeSingle();
    
    if(data) {
        currentUser = u;
        document.getElementById('main-play-btn').disabled = false;
        document.getElementById('main-play-btn').innerText = "PROCEED PILOT: " + u;
        closeModals();
    } else {
        alert("ACCESS DENIED");
    }
}

//spawns a missile at a random place
function spawnMissile() { 
    if (isPaused) return; 
    let angle = Math.random() * Math.PI * 2;
    //missile spawn away from sreen
    let m = missiles.create(player.x + Math.cos(angle) * 800, player.y + Math.sin(angle) * 800, 'missile'); 
    m.rotation = angle; 
    m.setSize(10, 20); //rectangle hitbox
}

//go from the menu into the active game
function startGame() { 
    document.getElementById('ui-layer').classList.add('hidden'); 
    isPaused = false; 
    //spawns every 2.5 seconds
    game.scene.scenes[0].time.addEvent({ 
        delay: 2500, 
        callback: spawnMissile, 
        callbackScope: game.scene.scenes[0], 
        loop: true 
    }); 
}

// Open leaderboard window
async function openLeaderboard() { 
    openModal('leaderboard-modal');
    const lbList = document.getElementById('lb-list');
    lbList.innerHTML = "FETCHING DATA...";

    //calls supabase table
    const { data, error } = await _supabase
        .from('leaderboards')
        .select('username, high_score')
        .order('high_score', { ascending: false })
        .limit(6);
    if (error) {
        lbList.innerHTML = "SYSTEM ERROR: UNABLE TO REACH DATABASE";
    } else if (data) {
        //maps the database into the HTML list
        lbList.innerHTML = data.map((e, i) => 
            `<div style="display:flex; justify-content:space-between; border-bottom:1px solid rgba(0,255,0,0.2); padding:5px;">
                <span>${i+1}. ${e.username}</span>
                <span>${e.high_score}</span>
            </div>`
        ).join('');
    }
}

//popup functions
function openModal(id) { 
    document.getElementById(id).style.display = 'block'; 
}

// Hides all ppups
function closeModals() { 
    document.querySelectorAll('.modal, .terminal-window').forEach(m => m.style.display = 'none'); 
}

</script>
</body>
</html>
