<!DOCTYPE html>
<html>
<head>
    <title>Vortex Evasion</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        /*CSS neon-theming*/
        :root { 
            --neon-green: #00ff00; 
            --menu-font: 'Press Start 2P', cursive; 
            --gold: #ffd700; 
            --bg-glass: rgba(0, 15, 0, 0.95); 
        }
        
        body { margin: 0; background: #000; overflow: hidden; font-family: var(--menu-font); cursor: crosshair; }
        
        /*UI covers the game until player hits play*/
        #ui-layer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 100; display: flex; flex-direction: column; align-items: center; 
            background: rgba(0, 0, 0, 0.4); 
        }
        
        .game-title { margin-top: 80px; font-size: 2.2rem; color: #fff; text-shadow: 4px 4px var(--neon-green); text-align: center; line-height: 1.5; }
        
        /*login/signup*/
        .auth-container { position: absolute; top: 20px; right: 20px; display: flex; gap: 15px; z-index: 150; align-items: center; }
        
        .auth-btn { 
            background: rgba(0,0,0,0.7); color: #fff; border: 2px solid var(--neon-green); 
            padding: 8px 12px; font-family: var(--menu-font); font-size: 0.7rem; 
            cursor: pointer; text-transform: uppercase; transition: 0.3s;
        }
        .auth-btn:hover:not(:disabled) { background: var(--neon-green); color: #000; box-shadow: 0 0 15px var(--neon-green); }

        /*leaderboard icon*/
        #lb-icon { 
            position: absolute; top: 20px; left: 20px; z-index: 150; cursor: pointer;
            width: 40px; height: 40px; background: var(--gold);
            clip-path: polygon(20% 0%, 80% 0%, 100% 20%, 100% 50%, 80% 70%, 60% 70%, 60% 90%, 80% 90%, 80% 100%, 20% 100%, 20% 90%, 40% 90%, 40% 70%, 20% 70%, 0% 50%, 0% 20%);
        }
        
        /*play btn disabled by default until logged in*/
        .play-btn { 
            background: transparent; color: var(--neon-green); border: 4px solid var(--neon-green); 
            padding: 20px 40px; font-size: 1.2rem; font-family: var(--menu-font); 
            cursor: pointer; text-transform: uppercase; margin-top: auto; margin-bottom: 120px;
        }

        /*opups*/
        .modal, .terminal-window { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: var(--bg-glass); border: 4px solid var(--neon-green); padding: 30px; 
            z-index: 200; text-align: center; min-width: 400px;
        }


        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="lb-icon" onclick="openLeaderboard()"></div>

<div id="ui-layer">
    <h1 class="game-title">VORTEX<br>EVASION</h1>
    <button class="play-btn" id="main-play-btn" onclick="startGame()" disabled>LOGIN TO PLAY</button>
</div>

<div class="auth-container" id="auth-ui">
    <button class="auth-btn" onclick="openModal('signup-modal')">SIGN UP</button>
    <button class="auth-btn" onclick="openModal('login-modal')">LOGIN</button>
</div>

<div id="signup-modal" class="modal">
    <h2>ENLIST PILOT</h2>
    <p style="color: #fff; font-size: 0.6rem;">?</p>
    <button class="auth-btn" onclick="closeModals()">CLOSE</button>
</div>

<div id="login-modal" class="modal">
    <h2>IDENTIFY</h2>
    <p style="color: #fff; font-size: 0.6rem;">?</p>
    <button class="auth-btn" onclick="closeModals()">CLOSE</button>
</div>

<div id="leaderboard-modal" class="terminal-window">
    <h2 style="color: var(--gold);">HALL OF FAME</h2>
    <div id="lb-list" style="color: var(--neon-green); font-size: 0.8rem; margin: 20px 0;">?</div>
    <button class="auth-btn" onclick="closeModals()">BACK</button>
</div>

<script>

/*databse connection*/
const _supabase = supabase.createClient('https://dqbtnmkiiwldlvrpaupj.supabase.co', 'sb_publishable_rMEMOFO_vVHyYdpjJQSqxg_djkgWVVT');
let currentUser = null; 
let isPaused = true; //prevents game from running in the menu

/*phaser eng config*/
const config = { 
    type: Phaser.AUTO, 
    width: window.innerWidth, 
    height: window.innerHeight, 
    physics: { default: 'arcade', arcade: { debug: false } }, 
    scene: { preload, create, update } 
};
const game = new Phaser.Game(config);

/*assets*/
function preload() {
    this.load.image('ship', 'https://upload.wikimedia.org/wikipedia/commons/1/1f/Space-Invaders-ship.png'); 
}

/*create game UI*/
function create() {
    // Spawns the player ship
    player = this.physics.add.sprite(config.width/2, config.height/2, 'ship').setScale(0.06);
    

}


function update() {

}

//popup functions
function openModal(id) { 
    document.getElementById(id).style.display = 'block'; 
}

// Hides all ppups
function closeModals() { 
    document.querySelectorAll('.modal, .terminal-window').forEach(m => m.style.display = 'none'); 
}

//go from the menu into the active game
function startGame() { 
    document.getElementById('ui-layer').classList.add('hidden'); 
    isPaused = false; 
}

// Open leaderboard window
async function openLeaderboard() { 
    openModal('leaderboard-modal');
}
</script>
</body>
</html>
